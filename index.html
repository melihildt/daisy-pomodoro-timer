<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daisy Field">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
<title>Pomodoro — Daisy Field</title>
<style>
/* =====================================================================
   iOS 26 Liquid Glass — Colors & Type (inlined)
   ===================================================================== */

:root {
  --font-sans:    -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Inter", system-ui, sans-serif;
  --font-rounded: ui-rounded, -apple-system, "SF Pro Rounded", "SF Compact Rounded", "Inter", system-ui, sans-serif;

  /* Type scale (iOS HIG) — used subsets */
  --text-callout:  16px;  --tr-callout:  -0.32px;
  --text-subhead:  15px;  --tr-subhead:  -0.23px;
  --text-footnote: 13px;  --lh-footnote: 18px;   --tr-footnote: -0.08px;

  /* Weights */
  --weight-thin:     200;
  --weight-medium:   500;
  --weight-semibold: 600;

  /* System colors — iOS 26 (light) */
  --green:  #34C759;
  --yellow: #FFCC00;

  /* Label / background semantics */
  --label-primary:   rgba(0, 0, 0, 1);
  --label-tertiary:  rgba(60, 60, 67, 0.30);

  --bg-tertiary: #FFFFFF;

  /* Liquid Glass tokens */
  --glass-blur-regular: saturate(180%) blur(20px);
  --glass-blur-thick:   saturate(180%) blur(40px);

  --glass-fill-regular:   rgba(255, 255, 255, 0.55);
  --glass-fill-clear:     rgba(255, 255, 255, 0.18);
  --glass-fill-prominent: rgba(255, 255, 255, 0.85);

  --glass-edge:
    inset 0 1px 0 0 rgba(255, 255, 255, 0.65),
    inset 0 -1px 0 0 rgba(255, 255, 255, 0.18),
    inset 1px 0 0 0 rgba(255, 255, 255, 0.22),
    inset -1px 0 0 0 rgba(255, 255, 255, 0.22);

  --glass-shadow-md: 0 2px 6px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.12);
  --glass-shadow-lg: 0 4px 12px rgba(0,0,0,0.10), 0 16px 48px rgba(0,0,0,0.18);

  /* Radii */
  --radius-sm:      10px;
  --radius-md:      14px;
  --radius-lg:      22px;
  --radius-xl:      28px;
  --radius-capsule: 999px;

  /* Spacing — iOS 8pt grid */
  --space-1: 2px;
  --space-2: 4px;
  --space-3: 8px;
  --space-4: 12px;
  --space-5: 16px;
  --space-6: 20px;
  --space-7: 24px;

  /* Motion */
  --ease-standard: cubic-bezier(0.25, 0.1, 0.25, 1);
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-snappy:   cubic-bezier(0.4, 0.0, 0.2, 1);

  --dur-fast: 120ms;
  --dur-base: 240ms;

  /* Tap state */
  --press-scale: 0.96;
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
  :root {
    --green:  #30D158;
    --yellow: #FFD60A;

    --label-primary:  rgba(255, 255, 255, 1);
    --label-tertiary: rgba(235, 235, 245, 0.30);

    --bg-tertiary: #2C2C2E;

    --glass-fill-regular:   rgba(40, 40, 50, 0.55);
    --glass-fill-clear:     rgba(40, 40, 50, 0.22);
    --glass-fill-prominent: rgba(28, 28, 30, 0.82);

    --glass-edge:
      inset 0 1px 0 0 rgba(255, 255, 255, 0.18),
      inset 0 -1px 0 0 rgba(0, 0, 0, 0.30),
      inset 1px 0 0 0 rgba(255, 255, 255, 0.06),
      inset -1px 0 0 0 rgba(255, 255, 255, 0.06);

    --glass-shadow-md: 0 2px 6px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.45);
    --glass-shadow-lg: 0 4px 12px rgba(0,0,0,0.40), 0 16px 48px rgba(0,0,0,0.60);
  }
}

/* Liquid Glass utility classes */
.glass,
.glass--regular {
  position: relative;
  background: var(--glass-fill-regular);
  -webkit-backdrop-filter: var(--glass-blur-regular);
  backdrop-filter: var(--glass-blur-regular);
  box-shadow: var(--glass-edge), var(--glass-shadow-md);
  border-radius: var(--radius-capsule);
  color: var(--label-primary);
  transition:
    background var(--dur-base) var(--ease-standard),
    transform   var(--dur-fast) var(--ease-snappy),
    box-shadow  var(--dur-base) var(--ease-standard);
}
.glass--clear {
  background: var(--glass-fill-clear);
  -webkit-backdrop-filter: var(--glass-blur-thick);
  backdrop-filter: var(--glass-blur-thick);
}
.glass--prominent {
  background: var(--glass-fill-prominent);
  box-shadow: var(--glass-edge), var(--glass-shadow-lg);
}
.glass--rect    { border-radius: var(--radius-xl); }
.glass--capsule { border-radius: var(--radius-capsule); }

@media (prefers-reduced-transparency: reduce) {
  .glass, .glass--regular, .glass--clear, .glass--prominent {
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
    background: var(--bg-tertiary);
  }
}
@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 0ms !important; animation-duration: 0ms !important; }
}

/* =====================================================================
   APP STYLES
   ===================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0b;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: var(--font-sans);
  color: var(--label-primary);
  position: relative;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ── VIEWPORT — always full screen ── */
#viewport {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 100vh;   /* fallback */
  height: 100dvh;  /* dynamic viewport — overridden by JS once layout settles */
  background: #000;
  overflow: hidden;
}

#garden {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.flower {
  position: absolute;
  width: 44px;
  height: 44px;
  transform-origin: center center;
  will-change: transform;
  pointer-events: none;
  opacity: 1;
}

.flower.gone {
  opacity: 0;
  transition: opacity 0.8s ease;
}

.petal-wrap {
  width: 100%;
  height: 100%;
  transform-origin: 50% 85%;
}

@keyframes flowerShake {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-6deg) scale(1.04); }
  50%  { transform: rotate(5deg)  scale(1.02); }
  75%  { transform: rotate(-3deg); }
  100% { transform: rotate(0deg); }
}

.petal-wrap.shaking {
  animation: flowerShake 0.55s ease-in-out infinite alternate;
}

/* ── UI PANEL — iOS 26 Liquid Glass ── */
#ui {
  position: absolute;
  z-index: 10;
  user-select: none;
  min-width: 320px;
  border-radius: var(--radius-xl);
  padding: var(--space-7) var(--space-7) var(--space-6);
  box-shadow: var(--glass-shadow-lg);
  transition:
    left  var(--dur-base) var(--ease-standard),
    right var(--dur-base) var(--ease-standard),
    top   var(--dur-base) var(--ease-standard),
    bottom var(--dur-base) var(--ease-standard),
    padding var(--dur-base) var(--ease-standard),
    min-width var(--dur-base) var(--ease-standard);
}

#ui .glass-mask {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}
#ui .glass-filter,
#ui .glass-overlay,
#ui .glass-specular {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}
#ui .glass-filter {
  z-index: 0;
  -webkit-backdrop-filter: blur(5px) saturate(180%) brightness(1.00);
  backdrop-filter: blur(5px) saturate(180%) brightness(1.00);
  filter: url(#liquidGlassLens);
}
#ui .glass-overlay {
  z-index: 1;
  background: rgba(28, 28, 30, 0.60);
}
#ui .glass-specular {
  z-index: 2;
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.16),
    inset 0 -1px 0 0 rgba(0,0,0,0.30),
    inset 1px 0 0 0 rgba(255,255,255,0.05),
    inset -1px 0 0 0 rgba(255,255,255,0.05);
  opacity: 0.25;
}
#ui .glass-content {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: var(--space-6);
}

/* ── POSITION — driven by body data attrs ── */
body[data-pos-h="left"]   #ui { left: 24px;  right: auto; }
body[data-pos-h="center"] #ui { left: 50%;   right: auto; }
body[data-pos-h="right"]  #ui { left: auto;  right: 24px; }
body[data-pos-v="top"]    #ui { top: 24px;   bottom: auto; }
body[data-pos-v="center"] #ui { top: 50%;    bottom: auto; }
/* PWA standalone — safe area covers home indicator only */
body[data-pos-v="bottom"] #ui { top: auto;   bottom: calc(24px + env(safe-area-inset-bottom, 0px)); }


body[data-pos-h="center"][data-pos-v="center"] #ui { transform: translate(-50%, -50%); }
body[data-pos-h="center"]:not([data-pos-v="center"]) #ui { transform: translateX(-50%); }
body[data-pos-v="center"]:not([data-pos-h="center"]) #ui { transform: translateY(-50%); }

/* ── CONDENSED — applied on mobile viewports ── */
body.condensed #ui {
  min-width: 0;
  width: calc(100% - 24px);
  max-width: 440px;
  padding: var(--space-5);
  border-radius: var(--radius-lg);
}
body.condensed #ui .glass-content {
  flex-direction: row;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--space-5);
}
body.condensed .ui-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
body.condensed .ui-col-left {
  flex: 1;
  min-width: 0;
  align-items: flex-start;
}
body.condensed .ui-col-right {
  flex: 0 0 auto;
  align-items: stretch;
  gap: 8px;
}
body.condensed #header {
  gap: 6px;
}
body.condensed #clock {
  font-size: 64px;
  line-height: 0.9;
  margin: 0;
  letter-spacing: -0.04em;
  text-align: left;
}
body.condensed #ctrls {
  justify-content: flex-end;
  gap: 6px;
}
body.condensed #duration-btns {
  align-self: stretch;
}

/* Trigger pill — visible in condensed mode */
body.condensed .duration-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: rgba(235,235,245,0.92);
  font-family: var(--font-sans);
  font-size: var(--text-footnote);
  font-weight: var(--weight-medium);
  letter-spacing: var(--tr-footnote);
  padding: 7px 12px;
  border-radius: var(--radius-capsule);
  cursor: pointer;
  transition:
    background var(--dur-base) var(--ease-standard),
    transform var(--dur-fast) var(--ease-snappy);
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 0 rgba(0,0,0,0.12);
}
body.condensed .duration-trigger:hover { background: rgba(255,255,255,0.14); }
body.condensed .duration-trigger:active { transform: scale(var(--press-scale)); }
body.condensed .duration-trigger-chev {
  width: 10px; height: 10px;
  opacity: 0.7;
  transition: transform var(--dur-base) var(--ease-standard);
  flex: none;
}
body.condensed #duration-btns.open .duration-trigger-chev { transform: rotate(180deg); }

/* Condensed: segs collapse into popover */
body.condensed .duration-options {
  display: none;
  padding: 6px;
}
body.condensed #duration-btns.open .duration-options {
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0;
  right: 0;
  background: rgba(58, 58, 60, 0.92);
  -webkit-backdrop-filter: var(--glass-blur-regular);
  backdrop-filter: var(--glass-blur-regular);
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.14),
    var(--glass-shadow-md);
  border-radius: var(--radius-md);
  z-index: 20;
  animation: popIn 0.18s var(--ease-spring);
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(4px) scale(0.96); }
  to   { opacity: 1; transform: none; }
}
body.condensed #duration-btns.open .seg {
  display: block;
  width: 100%;
  background: transparent;
  box-shadow: none;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  text-align: left;
  font-size: var(--text-footnote);
}
body.condensed #duration-btns.open .seg:hover {
  background: rgba(255,255,255,0.08);
  color: #fff;
}
body.condensed #duration-btns.open .seg.active {
  background: rgba(255,255,255,0.12);
  color: #fff;
  box-shadow: none;
}

body.condensed #btnPlayPause {
  width: 44px;
  height: 44px;
}
body.condensed #btnPlayPause svg { width: 16px; height: 16px; }
body.condensed #btnReset {
  flex: none;
  padding: 10px 16px;
  font-size: var(--text-subhead);
}

/* Column wrappers — no-op in laptop mode */
.ui-col { display: contents; }

/* ── HEADER ── */
#header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
}

#status-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: var(--label-tertiary);
  transition: background var(--dur-base) var(--ease-standard),
              box-shadow var(--dur-base) var(--ease-standard);
}
#status-dot.running {
  background: var(--green);
  box-shadow: 0 0 8px color-mix(in srgb, var(--green) 60%, transparent);
}
#status-dot.done {
  background: var(--yellow);
  box-shadow: 0 0 8px color-mix(in srgb, var(--yellow) 60%, transparent);
}

#label {
  font-size: var(--text-footnote);
  line-height: var(--lh-footnote);
  font-weight: var(--weight-semibold);
  color: rgba(235, 235, 245, 0.60);
  letter-spacing: 0.01em;
}

/* ── CLOCK ── */
#clock {
  font-family: var(--font-rounded);
  font-size: 84px;
  font-weight: var(--weight-thin);
  color: #fff;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 0.95;
  margin: var(--space-2) 0 var(--space-1);
  text-align: center;
}

/* ── SEGMENTED DURATION PICKER ── */
#duration-btns {
  position: relative;
}
.duration-trigger { display: none; }

.duration-options {
  display: flex;
  padding: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--radius-capsule);
  box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.05);
}

.seg {
  flex: 1;
  background: transparent;
  border: none;
  color: rgba(235, 235, 245, 0.55);
  font-family: var(--font-sans);
  font-size: var(--text-subhead);
  font-weight: var(--weight-medium);
  letter-spacing: var(--tr-subhead);
  padding: 7px 0;
  border-radius: var(--radius-capsule);
  cursor: pointer;
  transition:
    background var(--dur-base) var(--ease-standard),
    color var(--dur-base) var(--ease-standard),
    transform var(--dur-fast) var(--ease-snappy);
  font-variant-numeric: tabular-nums;
}
.seg:hover:not(.active):not(:disabled) {
  color: rgba(255,255,255,0.85);
}
.seg.active {
  background: rgba(255,255,255,0.14);
  color: #fff;
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 0 rgba(0,0,0,0.18),
    0 1px 2px rgba(0,0,0,0.30);
}
.seg:active:not(:disabled) { transform: scale(var(--press-scale)); }
.seg:disabled { opacity: 0.4; cursor: default; }

.duration-unit {
  display: flex;
  align-items: center;
  padding: 0 10px 0 6px;
  color: rgba(235, 235, 245, 0.35);
  font-family: var(--font-sans);
  font-size: var(--text-subhead);
  font-weight: var(--weight-medium);
  letter-spacing: var(--tr-subhead);
  pointer-events: none;
  white-space: nowrap;
}
body.condensed .duration-unit { display: none; }

/* ── CONTROL ROW ── */
#ctrls {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

/* Primary play/pause button */
#btnPlayPause {
  flex: none;
  width: 56px;
  height: 56px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  color: #000;
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 0 rgba(0,0,0,0.08),
    0 2px 8px rgba(0,0,0,0.30),
    0 8px 24px rgba(0,0,0,0.25);
  transition:
    transform var(--dur-fast) var(--ease-snappy),
    background var(--dur-base) var(--ease-standard);
}
#btnPlayPause:hover:not(:disabled) {
  background: #f5f5f7;
}
#btnPlayPause:active:not(:disabled) {
  transform: scale(var(--press-scale));
}
#btnPlayPause:disabled {
  opacity: 0.35;
  cursor: default;
}
#btnPlayPause svg {
  width: 22px;
  height: 22px;
  display: block;
}
#btnPlayPause .icon-play { margin-left: 2px; }

/* Secondary reset pill */
#btnReset {
  flex: 1;
  background: rgba(255,255,255,0.10);
  border: none;
  color: rgba(255,255,255,0.92);
  font-family: var(--font-sans);
  font-size: var(--text-callout);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tr-callout);
  padding: 14px 20px;
  border-radius: 999px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow:
    inset 0 1px 0 0 rgba(255,255,255,0.14),
    inset 0 -1px 0 0 rgba(0,0,0,0.18);
  transition:
    background var(--dur-base) var(--ease-standard),
    transform var(--dur-fast) var(--ease-snappy);
}
#btnReset:hover {
  background: rgba(255,255,255,0.16);
}
#btnReset:active {
  transform: scale(var(--press-scale));
  background: rgba(255,255,255,0.20);
}

#btnPlayPause:focus-visible,
#btnReset:focus-visible {
  outline: 2px solid rgba(255,255,255,0.6);
  outline-offset: 3px;
}

</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <filter id="liquidGlassLens" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
    <feComponentTransfer in="SourceAlpha" result="alpha">
      <feFuncA type="identity"/>
    </feComponentTransfer>
    <feGaussianBlur in="alpha" stdDeviation="20" result="blur"/>
    <feDisplacementMap in="SourceGraphic" in2="blur" scale="40" xChannelSelector="A" yChannelSelector="A"/>
  </filter>
</svg>

<div id="viewport">
  <div id="garden"></div>

  <div id="ui">
    <div class="glass-mask">
      <div class="glass-filter"></div>
      <div class="glass-overlay"></div>
      <div class="glass-specular"></div>
    </div>
    <div class="glass-content">
    <div class="ui-col ui-col-left">
      <div id="header">
        <div id="status-dot"></div>
        <div id="label">Focus</div>
      </div>
      <div id="clock">01:00</div>
    </div>
    <div class="ui-col ui-col-right">
      <div id="ctrls">
        <button id="btnPlayPause" aria-label="Start">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15c0 .9 1 1.4 1.7.9l12-7.5c.7-.4.7-1.4 0-1.8l-12-7.5C8 3.1 7 3.6 7 4.5z"/></svg>
        </button>
        <button id="btnReset">Reset</button>
      </div>
      <div id="duration-btns">
        <button class="duration-trigger" type="button" aria-label="Change duration" aria-haspopup="true" aria-expanded="false">
          <span class="duration-trigger-label">1 min</span>
          <svg class="duration-trigger-chev" viewBox="0 0 12 12" aria-hidden="true"><path d="M2.5 4.5l3.5 3.5 3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="duration-options">
          <button class="seg" data-min="1">1</button>
          <button class="seg" data-min="3">3</button>
          <button class="seg" data-min="5">5</button>
          <button class="seg" data-min="20">20</button>
          <button class="seg" data-min="45">45</button>
          <span class="duration-unit">min</span>
        </div>
      </div>
    </div>
    </div><!-- /.glass-content -->
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
let TOTAL     = 1 * 60;
const GRAV    = 0.013;
const MAX_VY  = 3.0;
const FLOWER_W  = 44;
const FLOWER_H  = 44;
const HM_RES    = 2;
const REPEL_D   = 56;
const REPEL_F   = 0.025;
const BUCKET_SZ = 64;

// Pick a random flower SVG.
// Blue group: 1.2× size boost. Yellow star (yellow_y): 1.2×. Others: 1.0×.
function pickFlowerSVG() {
  const group = Math.floor(Math.random() * 3); // 0=blue, 1=yellow, 2=red
  if (group === 0) return { svg: FLOWER_SVGS.blue, scaleMult: 1.2 };
  if (group === 1) {
    const isStarY = Math.random() < 0.5;
    return { svg: isStarY ? FLOWER_SVGS.yellow_y : FLOWER_SVGS.yellow_b, scaleMult: 1.0 };
  }
  return {
    svg: Math.random() < 0.5 ? FLOWER_SVGS.red_y : FLOWER_SVGS.red_b,
    scaleMult: 1.0
  };
}

// ── STATE ────────────────────────────────────────────────────────────────────
let flowers    = [];
let heightmap  = [];
let elapsed    = 0;
let running    = false;
let lastTick   = null;
let animId     = null;
let spawnAccum = 0;
let wakeLock         = null;
let collapsing       = false;  // always false — referenced by checkTopples/tickPhysics
let flatCollapsing   = false;
let flatCollapseTimeout = null;

const garden       = document.getElementById('garden');
const clockEl      = document.getElementById('clock');
const labelEl      = document.getElementById('label');
const statusDot    = document.getElementById('status-dot');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnReset     = document.getElementById('btnReset');
const viewportEl   = document.getElementById('viewport');

const VW = () => viewportEl.clientWidth;
const VH = () =>
  document.body.dataset.displayMode === 'standalone'
    ? window.screen.height     // PWA: no toolbar, ICB = full screen
    : viewportEl.clientHeight; // Safari/Chrome/desktop: clipped at clientHeight

// ── WAKE LOCK — keep screen on while timer runs ───────────────────────────
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
// iOS drops the lock when the app goes to background; re-acquire on return
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running) acquireWakeLock();
});

// ── ICONS ──────────────────────────────────────────────────────────────────
const ICON_PLAY  = '<svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15c0 .9 1 1.4 1.7.9l12-7.5c.7-.4.7-1.4 0-1.8l-12-7.5C8 3.1 7 3.6 7 4.5z"/></svg>';
const ICON_PAUSE = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4.5" width="4" height="15" rx="1.2"/><rect x="14" y="4.5" width="4" height="15" rx="1.2"/></svg>';
function setPlayPauseIcon(state) {
  btnPlayPause.innerHTML = state === 'pause' ? ICON_PAUSE : ICON_PLAY;
  btnPlayPause.setAttribute('aria-label', state === 'pause' ? 'Pause' : 'Start');
}


// ── HEIGHTMAP ────────────────────────────────────────────────────────────────
function initHeightmap() {
  const W   = VW();
  const H   = VH();
  const len = Math.ceil(W / HM_RES) + 2;
  heightmap = new Array(len).fill(H);
}

function hmIdx(x) {
  return Math.max(0, Math.min(heightmap.length - 1, Math.floor(x / HM_RES)));
}

function findSettleY(cx, scale) {
  const r  = (FLOWER_W / 2) * scale * 0.6;
  const i0 = hmIdx(cx - r);
  const i1 = hmIdx(cx + r);
  let top  = VH();
  for (let i = i0; i <= i1; i++) {
    if (heightmap[i] < top) top = heightmap[i];
  }
  return top - (FLOWER_H / 2) * scale - 1;
}

function paintHeightmap(cx, cy, scale) {
  const r   = (FLOWER_W / 2) * scale;
  const i0  = hmIdx(cx - r);
  const i1  = hmIdx(cx + r);
  const top = cy - (FLOWER_H / 2) * scale;
  for (let i = i0; i <= i1; i++) {
    if (top < heightmap[i]) heightmap[i] = top;
  }
}

// Rebuild heightmap from scratch using only currently settled flowers.
// Called after a flower is un-settled so the column height is correct.
function rebuildHeightmap() {
  const H   = VH();
  const len = heightmap.length;
  heightmap.fill(H);
  for (const f of flowers) {
    if (f.settled) paintHeightmap(f.x, f.y, f.scale);
  }
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnFlower() {
  const W   = VW();
  const x   = W * (0.02 + Math.random() * 0.96);
  const y   = -FLOWER_H;
  const vx  = (Math.random() - 0.5) * 0.5;
  const vy  = 0.6 + Math.random() * 0.5;

  const mobile = document.body.classList.contains('condensed');
  const scale  = mobile
    ? 0.65 + Math.random() * 0.35   // mobile:  0.65–1.00 — tighter ceiling, lower floor
    : 0.78 + Math.random() * 0.50;  // desktop: 0.78–1.28
  const rot  = Math.random() * 360;
  const spin = (Math.random() - 0.5) * 0.9;

  const { svg, scaleMult } = pickFlowerSVG();
  const finalScale = scale * scaleMult;

  const el = document.createElement('div');
  el.className = 'flower';
  el.innerHTML = `<div class="petal-wrap">${svg}</div>`;
  garden.appendChild(el);
  setTransform(el, x, y, rot, finalScale);

  flowers.push({ el, x, y, vx, vy, rot, spin, scale: finalScale, settled: false });
}

// ── SETTLING ─────────────────────────────────────────────────────────────────
function trySettle(f) {
  const settleY = findSettleY(f.x, f.scale);
  if (settleY < f.y - 4) return false;

  const RESTITUTION   = 0.15;
  const BOUNCE_VY_MIN = 0.6;
  if (f.vy > BOUNCE_VY_MIN) {
    f.y    = settleY;
    f.vy   = -f.vy * RESTITUTION;
    f.vx  *= 0.6;
    f.spin *= 0.5;
    setTransform(f.el, f.x, f.y, f.rot, f.scale);
    return true;
  }

  f.settled = true;
  f.y       = settleY;
  f.vx      = 0;
  f.vy      = 0;
  f.spin    = 0;
  f.rot    += (Math.random() - 0.5) * 22;

  paintHeightmap(f.x, f.y, f.scale);
  f.el.classList.add('settled');
  setTransform(f.el, f.x, f.y, f.rot, f.scale);
  return true;
}

// ── REPULSION ────────────────────────────────────────────────────────────────
function buildBuckets() {
  const b = {};
  for (const f of flowers) {
    if (f.settled) continue;
    const key = Math.floor(f.x / BUCKET_SZ) + ',' + Math.floor(f.y / BUCKET_SZ);
    (b[key] = b[key] || []).push(f);
  }
  return b;
}

function applyRepulsion(dtScale) {
  const buckets = buildBuckets();
  for (const f of flowers) {
    if (f.settled) continue;
    const bx = Math.floor(f.x / BUCKET_SZ);
    const by = Math.floor(f.y / BUCKET_SZ);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const nb = buckets[(bx + dx) + ',' + (by + dy)];
        if (!nb) continue;
        for (const n of nb) {
          if (n === f) continue;
          const ddx = f.x - n.x;
          const ddy = f.y - n.y;
          const d2  = ddx * ddx + ddy * ddy;
          if (d2 < REPEL_D * REPEL_D && d2 > 0.01) {
            const d     = Math.sqrt(d2);
            const force = (REPEL_D - d) / REPEL_D * REPEL_F;
            f.vx += (ddx / d) * force * dtScale;
            f.vy += (ddy / d) * force * dtScale;
          }
        }
      }
    }
  }
}


// ── AVALANCHE — topple flowers off steep piles ────────────────────────────────
// Un-settle the topmost flower near `x`, push it sideways (`dir`: -1 left, +1 right).
function toppleFlowerNear(x, dir) {
  let best = null;
  for (const f of flowers) {
    if (!f.settled) continue;
    if (Math.abs(f.x - x) > 32) continue;
    if (!best || f.y < best.y) best = f;
  }
  if (!best) return false;

  best.settled = false;
  best.el.classList.remove('settled');
  best.vx   = dir * (0.5 + Math.random() * 0.7);
  best.vy   = 0.3 + Math.random() * 0.3;       // already falling downward
  best.spin = (Math.random() - 0.5) * 0.9;
  rebuildHeightmap();
  return true;
}

// Scan the heightmap for slopes steeper than TOPPLE_THRESHOLD.
// Called once per TOPPLE_INTERVAL frames; triggers at most TOPPLE_PER_SCAN topples.
function checkTopples() {
  if (collapsing) return;
  if (++toppleFrame % TOPPLE_INTERVAL !== 0) return;

  let triggered = 0;
  let skip      = 0;

  for (let i = TOPPLE_SCAN_STEP; i < heightmap.length - TOPPLE_SCAN_STEP; i++) {
    if (skip > 0)                       { skip--; continue; }
    if (triggered >= TOPPLE_PER_SCAN)   break;

    const curr  = heightmap[i];
    const left  = heightmap[i - TOPPLE_SCAN_STEP];
    const right = heightmap[i + TOPPLE_SCAN_STEP];

    // `left - curr > 0` means left neighbour is a shorter pile (higher y value)
    if (left - curr > TOPPLE_THRESHOLD) {
      if (toppleFlowerNear(i * HM_RES, -1)) { triggered++; skip = TOPPLE_SCAN_STEP * 3; }
    } else if (right - curr > TOPPLE_THRESHOLD) {
      if (toppleFlowerNear(i * HM_RES,  1)) { triggered++; skip = TOPPLE_SCAN_STEP * 3; }
    }
  }
}

// ── FLAT PILE — drop all flowers straight to the floor, overlapping ───────────
function flattenToBottom() {
  flatCollapseTimeout = null;
  flatCollapsing = true;

  flowers.forEach(f => {
    const wrap = f.el.querySelector('.petal-wrap');
    if (wrap) wrap.classList.remove('shaking');

    f.settled = false;
    f.el.classList.remove('settled');
    f.vx   = (Math.random() - 0.5) * 0.3;
    f.vy   = -(0.8 + Math.random() * 0.6);
    f.spin = (Math.random() - 0.5) * 1.2;
  });

  const FLAT_GRAV_VAL    = 0.05;
  const FLAT_MAX_VY      = 10.0;
  const FLAT_RESTITUTION = 0.50;
  const FLAT_SETTLE_VY   = 0.40;

  let lastFlatTs = null;

  function loopFlat(ts) {
    if (!flatCollapsing) return;
    const dt = lastFlatTs ? Math.min(ts - lastFlatTs, 80) : 16;
    lastFlatTs = ts;
    const dtScale = dt / (1000 / 60);
    const W = VW();
    const H = VH();

    for (const f of flowers) {
      if (f.settled) continue;
      f.vy = Math.min(f.vy + FLAT_GRAV_VAL * dtScale, FLAT_MAX_VY);
      f.x += f.vx * dtScale;
      f.y += f.vy * dtScale;
      f.rot += f.spin * dtScale;

      if (f.x < FLOWER_W / 2)     { f.x = FLOWER_W / 2;     f.vx =  Math.abs(f.vx) * 0.3; }
      if (f.x > W - FLOWER_W / 2) { f.x = W - FLOWER_W / 2; f.vx = -Math.abs(f.vx) * 0.3; }

      const floorY = H - (FLOWER_H / 2) * f.scale;
      if (f.y >= floorY) {
        f.y = floorY;
        if (Math.abs(f.vy) > FLAT_SETTLE_VY) {
          f.vy    = -f.vy * FLAT_RESTITUTION;
          f.vx   *= 0.8;
          f.spin *= 0.7;
        } else {
          f.settled = true;
          f.vx = 0; f.vy = 0; f.spin = 0;
        }
      }

      setTransform(f.el, f.x, f.y, f.rot, f.scale);
    }

    if (flowers.every(f => f.settled)) {
      flatCollapsing = false;
      return;
    }
    requestAnimationFrame(loopFlat);
  }

  requestAnimationFrame(loopFlat);
}

function setTransform(el, x, y, rot, scale) {
  el.style.transform =
    `translate(${x - FLOWER_W / 2}px,${y - FLOWER_H / 2}px) rotate(${rot}deg) scale(${scale})`;
}

function tickPhysics(dt) {
  const W       = VW();
  const H       = VH();
  const dtScale = dt / (1000 / 60);

  applyRepulsion(dtScale);
  if (!collapsing) checkTopples();

  for (let i = flowers.length - 1; i >= 0; i--) {
    const f = flowers[i];
    if (f.settled) continue;

    if (collapsing) f.vx += (VW() / 2 - f.x) * 0.00015 * dtScale;
    f.vy = Math.min(f.vy + GRAV * dtScale, MAX_VY);

    f.x   += f.vx * dtScale;
    f.y   += f.vy * dtScale;
    f.rot += f.spin * dtScale;

    if (f.x < FLOWER_W / 2)     { f.x = FLOWER_W / 2;     f.vx =  Math.abs(f.vx) * 0.4; }
    if (f.x > W - FLOWER_W / 2) { f.x = W - FLOWER_W / 2; f.vx = -Math.abs(f.vx) * 0.4; }

    if (f.y >= findSettleY(f.x, f.scale)) {
      if (!trySettle(f)) {
        f.vy = Math.max(f.vy * 0.5, 0.3);
      }
      continue;
    }

    if (f.y > H + FLOWER_H * 2) {
      f.el.remove();
      flowers.splice(i, 1);
      continue;
    }

    setTransform(f.el, f.x, f.y, f.rot, f.scale);
  }
}

// ── SPAWN RATE ────────────────────────────────────────────────────────────────
// Sqrt ramp: 0.012 + 0.085 * √p  →  ~0.72/sec at start, ~5.8/sec at end
// Mobile gets 0.6× (smaller canvas fills up faster; also flowers are 10% smaller).
function spawnRate(sec) {
  const p    = Math.min(1, sec / TOTAL);
  const base = 0.012 + 0.085 * Math.sqrt(p);
  return document.body.classList.contains('condensed') ? base * 0.6 : base;
}

// ── TIMER LOOP ────────────────────────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function loop(ts) {
  if (!running) return;
  const dt = lastTick ? Math.min(ts - lastTick, 80) : 16;
  lastTick  = ts;
  elapsed  += dt / 1000;

  if (elapsed >= TOTAL) {
    elapsed = TOTAL;
    running = false;
    releaseWakeLock();
    clockEl.textContent      = '00:00';
    labelEl.textContent      = 'Done';
    statusDot.classList.remove('running');
    statusDot.classList.add('done');
    setPlayPauseIcon('play');
    btnPlayPause.disabled    = true;
    setSegsDisabled(false);
    for (let i = 0; i < 10; i++) spawnFlower();
    flatCollapseTimeout = setTimeout(flattenToBottom, 500);
    tickPhysics(dt);
    animId = requestAnimationFrame(loop);
    return;
  }

  clockEl.textContent = formatTime(TOTAL - elapsed);

  spawnAccum += spawnRate(elapsed) * (dt / (1000 / 60));
  while (spawnAccum >= 1) { spawnFlower(); spawnAccum -= 1; }

  tickPhysics(dt);
  animId = requestAnimationFrame(loop);
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
btnPlayPause.addEventListener('click', () => {
  if (running) {
    running = false;
    releaseWakeLock();
    setPlayPauseIcon('play');
    statusDot.classList.remove('running');
    labelEl.textContent = 'Paused';
    if (animId) cancelAnimationFrame(animId);
    setSegsDisabled(false);
  } else {
    running  = true;
    acquireWakeLock();
    lastTick = null;
    setPlayPauseIcon('pause');
    statusDot.classList.remove('done');
    statusDot.classList.add('running');
    labelEl.textContent = 'Focus';
    setSegsDisabled(true);
    animId = requestAnimationFrame(loop);
  }
});

btnReset.addEventListener('click', doReset);

function doReset() {
  running        = false;
  releaseWakeLock();
  collapsing     = false;
  flatCollapsing = false;
  if (flatCollapseTimeout) { clearTimeout(flatCollapseTimeout); flatCollapseTimeout = null; }
  if (animId) cancelAnimationFrame(animId);
  elapsed    = 0;
  spawnAccum = 0;
  lastTick   = null;

  setPlayPauseIcon('play');
  btnPlayPause.disabled    = false;
  setSegsDisabled(false);
  clockEl.textContent      = formatTime(TOTAL);
  labelEl.textContent      = 'Ready';
  statusDot.classList.remove('running', 'done');

  flowers.forEach(f => f.el.classList.add('gone'));
  setTimeout(() => {
    flowers.forEach(f => f.el.remove());
    flowers = [];
    initHeightmap();
  }, 850);
}

// ── DURATION PRESETS ─────────────────────────────────────────────────────────
function setSegsDisabled(disabled) {
  document.querySelectorAll('.seg[data-min]').forEach(b => b.disabled = disabled);
}
const durationBtnsEl    = document.getElementById('duration-btns');
const durationTriggerEl = durationBtnsEl.querySelector('.duration-trigger');
const durationLabelEl   = durationBtnsEl.querySelector('.duration-trigger-label');

function fmtMinsLabel(secs) {
  const m = Math.round(secs / 60);
  return `${m} min`;
}
function syncDurationLabel() {
  durationLabelEl.textContent = fmtMinsLabel(TOTAL);
  const currentMin = Math.round(TOTAL / 60);
  document.querySelectorAll('.seg[data-min]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.min, 10) === currentMin);
  });
}

durationTriggerEl.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = durationBtnsEl.classList.toggle('open');
  durationTriggerEl.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});
document.addEventListener('click', (e) => {
  if (!durationBtnsEl.contains(e.target)) {
    durationBtnsEl.classList.remove('open');
    durationTriggerEl.setAttribute('aria-expanded', 'false');
  }
});

document.querySelectorAll('.seg[data-min]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (running) return;
    const mins = parseInt(btn.dataset.min, 10);
    TOTAL = mins * 60;
    syncDurationLabel();
    durationBtnsEl.classList.remove('open');
    durationTriggerEl.setAttribute('aria-expanded', 'false');
    doReset();
  });
});

// ── LAYOUT — fixed positions per viewport size ────────────────────────────────
// Mobile / tablet (≤ 900px): condensed panel, centered bottom
// Desktop (> 900px):         normal panel, right bottom
function applyLayout() {
  const condensed = window.innerWidth <= 900;
  document.body.classList.toggle('condensed', condensed);
  document.body.dataset.posH = condensed ? 'center' : 'right';
  document.body.dataset.posV = 'bottom';

  const isMobileIOS  = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true ||
                       window.matchMedia('(display-mode: standalone)').matches;
  const isChromeIOS  = /CriOS/i.test(navigator.userAgent);
  const mode = isStandalone ? 'standalone'
             : isChromeIOS  ? 'chrome'
             : isMobileIOS  ? 'safari'
             : 'desktop';
  document.body.dataset.displayMode = mode;

  // Capture clientHeight before we resize the canvas element
  const clientH = viewportEl.clientHeight;

  // Size the flower canvas to VH() — for safari/standalone this is screen.height,
  // for chrome/desktop it stays at clientHeight
  viewportEl.style.height = VH() + 'px';

  // Position the #ui panel via inline style (overrides CSS for mobile modes)
  const uiEl = document.getElementById('ui');
  if (mode === 'chrome') {
    uiEl.style.bottom = '32px';
  } else if (mode === 'safari') {
    uiEl.style.bottom = '32px';
  } else if (mode === 'standalone') {
    uiEl.style.bottom = 'calc(32px + env(safe-area-inset-bottom, 0px))';
  }
  // 'desktop' leaves bottom unset so the CSS fallback rule applies
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function setup() {
  applyLayout();
  clockEl.textContent = formatTime(TOTAL);
  setPlayPauseIcon('play');
  labelEl.textContent = 'Ready';
  syncDurationLabel();
  window.addEventListener('resize', () => {
    applyLayout();
    initHeightmap();
  });

  // Delay the initial heightmap build until the browser chrome has settled.
  // A single rAF is not enough on iOS — the toolbar finishes adjusting a few
  // frames later, so we nest a short setTimeout inside rAF.
  requestAnimationFrame(() => setTimeout(initHeightmap, 100));
}

setup();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
